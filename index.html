<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vehicle Registration | Mechanic Workshop</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .form-input:focus {
            border-color: #137fec;
            box-shadow: 0 0 0 1px #137fec;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden max-w-md mx-auto shadow-2xl border-x border-slate-200 dark:border-slate-800">
<!-- Header Section -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10 border-b border-slate-200 dark:border-slate-800">
<div class="text-primary flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Register New Vehicle</h2>
</div>
<form class="flex flex-col gap-1 pb-24">
<!-- Vehicle Section -->
<div class="px-4 pt-6 pb-2">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary text-sm">directions_car</span>
<h3 class="text-slate-900 dark:text-slate-100 text-base font-bold uppercase tracking-wider">Vehicle Details</h3>
</div>
<p class="text-slate-500 dark:text-slate-400 text-xs">Enter the technical specifications of the vehicle.</p>
</div>
<div class="flex flex-col gap-4 px-4 py-3">
<!-- Plate Number -->
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-1.5 ml-1">Plate Number</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-xl">pin</span>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-600 pl-11 pr-4 text-base font-normal transition-all" placeholder="ABC-1234" type="text" uppercase=""/>
</div>
</label>
<!-- Brand & Model Row -->
<div class="flex gap-4">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-1.5 ml-1">Brand</p>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-600 px-4 text-base font-normal transition-all" placeholder="Toyota" type="text"/>
</label>
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-1.5 ml-1">Model</p>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-600 px-4 text-base font-normal transition-all" placeholder="Corolla" type="text"/>
</label>
</div>
<!-- Year & Odometer Row -->
<div class="flex gap-4">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-1.5 ml-1">Year</p>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-600 px-4 text-base font-normal transition-all" inputmode="numeric" placeholder="2023" type="number"/>
</label>
<label class="flex flex-col flex-[1.5]">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-1.5 ml-1">Current Odometer</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-600 pl-4 pr-12 text-base font-normal transition-all" inputmode="numeric" placeholder="45,000" type="number"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium text-sm">km</span>
</div>
</label>
</div>
</div>
<div class="h-px bg-slate-200 dark:bg-slate-800 mx-4 my-4"></div>
<!-- Owner Section -->
<div class="px-4 pt-2 pb-2">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary text-sm">person</span>
<h3 class="text-slate-900 dark:text-slate-100 text-base font-bold uppercase tracking-wider">Owner Information</h3>
</div>
<p class="text-slate-500 dark:text-slate-400 text-xs">Primary contact information for the customer.</p>
</div>
<div class="flex flex-col gap-4 px-4 py-3">
<!-- Owner Name -->
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-1.5 ml-1">Owner Name</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-xl">badge</span>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-600 pl-11 pr-4 text-base font-normal transition-all" placeholder="John Doe" type="text"/>
</div>
</label>
<!-- Phone Number -->
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-1.5 ml-1">Phone Number</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-xl">call</span>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-600 pl-11 pr-4 text-base font-normal transition-all" inputmode="tel" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</label>
</div>
<!-- Fixed Bottom Action -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-slate-200 dark:border-slate-800">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 active:scale-[0.98]" type="submit">
<span class="material-symbols-outlined">save</span>
                    Save Vehicle
                </button>
</div>
</form>
<!-- Decorative Spacer -->
<div class="h-10 bg-background-light dark:bg-background-dark"></div>
</div>
<script>
document.querySelector("form").addEventListener("submit", function(e) {
  e.preventDefault();

  const vehicle = {
    plate: document.querySelector('input[placeholder="ABC-1234"]').value,
    brand: document.querySelector('input[placeholder="Toyota"]').value,
    model: document.querySelector('input[placeholder="Corolla"]').value,
    year: document.querySelector('input[placeholder="2023"]').value,
    odometer: document.querySelector('input[placeholder="45,000"]').value,
    owner: document.querySelector('input[placeholder="John Doe"]').value,
    phone: document.querySelector('input[placeholder="+1 (555) 000-0000"]').value
  };

  let vehicles = JSON.parse(localStorage.getItem("vehicles")) || [];
  vehicles.push(vehicle);
  localStorage.setItem("vehicles", JSON.stringify(vehicles));

  alert("Vehicle saved successfully!");
  this.reset();
});
</script></body></html>
